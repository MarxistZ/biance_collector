version: '3.8'

services:
  binance-collector:
    build: .
    container_name: binance-collector
    restart: unless-stopped

    volumes:
      # 数据持久化
      - ./data:/app/data
      # 日志持久化
      - ./logs:/app/logs
      # 配置文件（可选，用于动态修改配置）
      - ./config.py:/app/config.py:ro

    environment:
      - TZ=UTC
      - PYTHONUNBUFFERED=1

    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    # 健康检查
    healthcheck:
      test: ["CMD", "python3", "-c", "import os; exit(0 if os.path.exists('/app/logs/main.log') else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

    # 网络配置
    network_mode: bridge
